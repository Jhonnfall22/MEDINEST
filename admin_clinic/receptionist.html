<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Receptionist Dashboard | Vet Clinics</title>

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/favicon.ico" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Theme -->
    <link rel="stylesheet" href="assets/css/theme.min.css">
    <link rel="stylesheet" href="assets/vendors/css/vendors.min.css">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }
        .nxl-header {
            background: #fff;
            border-bottom: 1px solid #dee2e6;
        }
        .nxl-navigation {
            background: #fff;
            border-right: 1px solid #dee2e6;
        }
        table {
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<nav class="nxl-navigation">
    <div class="navbar-wrapper">
        <div class="navbar-content">
            <ul class="nxl-navbar">
                <li class="nxl-item nxl-caption"><label>Receptionist</label></li>

                <li class="nxl-item">
                    <a class="nxl-link" href="index.html">
                        <span class="nxl-micon"><i class="bi bi-house"></i></span>
                        <span class="nxl-mtext">Dashboard</span>
                    </a>
                </li>

                <li class="nxl-item active">
                    <a class="nxl-link" href="#">
                        <span class="nxl-micon"><i class="bi bi-calendar-event"></i></span>
                        <span class="nxl-mtext">Appointments</span>
                    </a>
                </li>

                <li class="nxl-item mt-5">
                    <a class="nxl-link text-danger" href="login.html">
                        <span class="nxl-micon"><i class="bi bi-power"></i></span>
                        <span class="nxl-mtext">Logout</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ================= HEADER ================= -->
<header class="nxl-header">
    <div class="container-fluid py-3 px-4 d-flex justify-content-between">
        <h5 class="mb-0 fw-bold">Receptionist Dashboard</h5>
        <span class="badge bg-light text-primary border border-primary">Active</span>
    </div>
</header>

<!-- ================= MAIN ================= -->
<main class="nxl-container mt-4">
    <div class="nxl-content px-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold">Appointment Management</h4>
                <small class="text-muted">Register and monitor appointments</small>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#appointmentModal">
                <i class="bi bi-plus-lg"></i> New Appointment
            </button>
        </div>

        <!-- STATS -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card p-3">
                    <small>Total</small>
                    <h4 id="totalPatients">0</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <small>Walk-In</small>
                    <h4 class="text-success" id="walkInToday">0</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <small>Online</small>
                    <h4 class="text-warning" id="onlineAppointments">0</h4>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3">
                    <small>Checked-In</small>
                    <h4 class="text-info" id="checkedIn">0</h4>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <div class="card-header fw-bold">Recent Appointments</div>
            <div class="table-responsive">
                <table class="table table-bordered align-middle mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Pet</th>
                            <th>Owner</th>
                            <th>Clinic</th>
                            <th>Status</th>
                            <th>Type</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="appointmentModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="patientForm">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">New Appointment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label">Pet Name</label>
                            <input type="text" class="form-control" id="petName" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Species</label>
                            <select class="form-select" required>
                                <option>Dog</option>
                                <option>Cat</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Breed</label>
                            <input type="text" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Owner Name</label>
                            <input type="text" class="form-control" id="ownerName" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Contact</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Clinic</label>
                            <select class="form-select" id="clinicName" required>
                                <option>PawCare Vet Clinic</option>
                                <option>Happy Tails Veterinary</option>
                                <option>AnimalCare Center</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Date</label>
                            <input type="date" class="form-control" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Time</label>
                            <input type="time" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Type</label>
                            <select class="form-select" id="appointmentType">
                                <option value="walkIn">Walk-In</option>
                                <option value="online">Online</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Reason</label>
                            <input type="text" class="form-control" placeholder="Check-up, Vaccine, etc.">
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" type="submit">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let patients = [
    { pet: 'Max', owner: 'Juan Dela Cruz', clinic: 'PawCare Vet Clinic', status: 'Checked-In', walkIn: true },
    { pet: 'Luna', owner: 'Maria Santos', clinic: 'Happy Tails Veterinary', status: 'Waiting', walkIn: false }
];

function renderTable() {
    const body = document.getElementById('patientTableBody');
    body.innerHTML = '';

    patients.forEach((p, i) => {
        body.innerHTML += `
        <tr>
            <td>${i + 1}</td>
            <td>${p.pet}</td>
            <td>${p.owner}</td>
            <td>${p.clinic}</td>
            <td><span class="badge bg-success">${p.status}</span></td>
            <td><span class="badge ${p.walkIn ? 'bg-success' : 'bg-warning text-dark'}">
                ${p.walkIn ? 'Walk-In' : 'Online'}
            </span></td>
        </tr>`;
    });

    totalPatients.innerText = patients.length;
    walkInToday.innerText = patients.filter(p => p.walkIn).length;
    onlineAppointments.innerText = patients.filter(p => !p.walkIn).length;
    checkedIn.innerText = patients.length;
}

document.getElementById('patientForm').onsubmit = function(e) {
    e.preventDefault();

    patients.unshift({
        pet: petName.value,
        owner: ownerName.value,
        clinic: clinicName.value,
        status: 'Checked-In',
        walkIn: appointmentType.value === 'walkIn'
    });

    this.reset();
    bootstrap.Modal.getInstance(document.getElementById('appointmentModal')).hide();
    renderTable();
};

renderTable();
</script>

</body>
</html>
