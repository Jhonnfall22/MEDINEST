<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VetAdmin | Super Admin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --admin-primary: #220bef;
            --sidebar-width: 260px;
            --bg-body: #f4f7fa;
            --bg-card: #ffffff;
            --border-color: #e0e0e0;
            --text-main: #333333;
        }

        [data-bs-theme="dark"] {
            --bg-body: #0b0e14;
            --bg-card: #151921;
            --border-color: #2d343f;
            --text-main: #e1e1e1;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            transition: background 0.3s ease;
            overflow-x: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-card);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid var(--border-color);
            transition: transform 0.3s ease;
            z-index: 1060;
        }
        
        .sidebar-brand { padding: 25px; font-weight: 700; color: var(--admin-primary); font-size: 1.1rem; height: 80px; }
        
        .nav-link { 
            color: #6c757d; padding: 12px 20px; display: flex; align-items: center; 
            gap: 12px; border-radius: 8px; margin: 0 15px 5px; transition: 0.2s; font-weight: 500;
            text-decoration: none;
        }
        
        .nav-link:hover, .nav-link.active { background: rgba(34, 11, 239, 0.08); color: var(--admin-primary); }

        .nxl-container { margin-left: var(--sidebar-width); padding: 30px; transition: margin 0.3s ease; }

        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 20px; }

        .spark-container { height: 80px; }
        .main-chart-container { height: 400px; width: 100%; }

        /* FullCalendar Custom Styling */
        #calendar {
            min-height: 400px;
            font-size: 0.85rem;
        }
        .fc .fc-button-primary {
            background-color: var(--admin-primary);
            border-color: var(--admin-primary);
        }
        .fc .fc-toolbar-title { font-size: 1rem; font-weight: 700; }

        .theme-toggle {
            cursor: pointer; width: 40px; height: 40px; border-radius: 10px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-main); display: flex; align-items: center; justify-content: center;
        }

        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1050; backdrop-filter: blur(2px);
        }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .nxl-container { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand d-flex align-items-center">
        <i data-feather="heart" class="me-2 text-primary"></i> 
        <span class="brand-text">Super Admin</span>
    </div>

    <nav class="nav flex-column mt-2">
        <a class="nav-link active" href="index_superadmin.html">
            <i data-feather="grid"></i> 
            <span class="sidebar-text">Dashboard</span>
        </a>

        <a class="nav-link" href="client.html">
            <i data-feather="users"></i> 
            <span class="sidebar-text">Clients</span>
        </a>

        <a class="nav-link" href="clinic.html">
            <i data-feather="home"></i> 
            <span class="sidebar-text">Clinics</span>
        </a>

        <a class="nav-link" href="history.html">
            <i data-feather="clock"></i> 
            <span class="sidebar-text">Clinic History</span>
        </a>

        <hr class="mx-3 my-2" style="opacity: 0.1;">

        <a class="nav-link text-danger" href="login.html">
            <i data-feather="log-out"></i> 
            <span class="sidebar-text">Sign Out</span>
        </a>
    </nav>
</aside>


    <main class="nxl-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-1">Vet  Overview</h4>
                <p class="text-muted small mb-0">Real-time performance and scheduling.</p>
            </div>
            <div class="d-flex gap-2">
                <button class="theme-toggle" id="darkModeBtn"><i data-feather="moon" id="themeIcon"></i></button>
                <button class="theme-toggle d-lg-none" id="mobileToggle"><i data-feather="menu"></i></button>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-sm-6 col-xl-3">
                <div class="card p-3 h-100">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.65rem;">Total Branches</small>
                    <h3 class="fw-bold mt-1">42</h3>
                    <div id="chart-clinics" class="spark-container"></div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card p-3 h-100">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.65rem;">Total Patients</small>
                    <h3 class="fw-bold mt-1">8.2K</h3>
                    <div id="chart-clients" class="spark-container"></div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card p-3 h-100 border-start border-success border-4">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.65rem;">Appointments</small>
                    <h3 class="fw-bold mt-1 text-success">312</h3>
                    <div id="chart-legit" class="spark-container"></div>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="card p-3 h-100 border-start border-danger border-4">
                    <small class="text-muted fw-bold text-uppercase" style="font-size: 0.65rem;">Urgent Cases</small>
                    <h3 class="fw-bold mt-1 text-danger">14</h3>
                    <div id="chart-pending" class="spark-container"></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-xl-8">
                <div class="card p-4 h-100">
                    <h6 class="fw-bold mb-4">Registration & Consultation Trends</h6>
                    <div id="main-status-chart" class="main-chart-container"></div>
                </div>
            </div>
            
            <div class="col-xl-4">
                <div class="card p-3 h-100">
                    <h6 class="fw-bold mb-3 px-2">Schedule</h6>
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    
    <script>
        feather.replace();
        const body = document.documentElement;
        let mainChart;
        let calendar;

        function applyTheme(theme) {
            body.setAttribute('data-bs-theme', theme);
            localStorage.setItem('admin_theme', theme);
            const icon = document.getElementById('themeIcon');
            if (icon) icon.outerHTML = `<i data-feather="${theme === 'dark' ? 'sun' : 'moon'}" id="themeIcon"></i>`;
            feather.replace();
            
            setTimeout(() => {
                initMainChart(theme);
                initSparklines(theme);
                if(calendar) calendar.render();
            }, 100);
        }

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (!calendarEl) return;
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                events: [{ title: 'Vaccination', start: new Date(), color: '#220bef' }],
                height: 'auto'
            });
            calendar.render();
        }

        function initMainChart(theme) {
            const isDark = theme === 'dark';
            const options = {
                chart: { type: 'bar', height: 350, toolbar: { show: false }, foreColor: isDark ? '#a0a0a0' : '#6c757d' },
                series: [
                    { name: 'Regular', data: [120, 155, 187, 156, 191, 210] },
                    { name: 'Emergency', data: [45, 60, 85, 42, 77, 95] }
                ],
                xaxis: { categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'] },
                colors: ['#220bef', isDark ? '#2d343f' : '#e2e8f0'],
                plotOptions: { bar: { columnWidth: '55%', borderRadius: 5 } },
                legend: { position: 'top' },
                tooltip: { theme: isDark ? 'dark' : 'light' }
            };
            if (mainChart) mainChart.destroy();
            mainChart = new ApexCharts(document.querySelector("#main-status-chart"), options);
            mainChart.render();
        }

        function initSparklines(theme) {
            const isDark = theme === 'dark';
            const ids = ['#chart-clinics', '#chart-clients', '#chart-legit', '#chart-pending'];
            const colors = ['#220bef', '#6366f1', '#10b981', '#ef4444'];
            
            ids.forEach((id, idx) => {
                const el = document.querySelector(id);
                if(!el) return;
                el.innerHTML = "";
                new ApexCharts(el, {
                    chart: { type: 'area', height: 80, sparkline: { enabled: true } },
                    stroke: { curve: 'smooth', width: 2 },
                    colors: [colors[idx]],
                    series: [{ data: [31, 40, 28, 51, 42, 109, 100] }],
                    fill: { type: 'gradient', gradient: { opacityFrom: 0.3, opacityTo: 0 } },
                    tooltip: { theme: isDark ? 'dark' : 'light' }
                }).render();
            });
        }
        document.getElementById('darkModeBtn').addEventListener('click', () => {
            const current = body.getAttribute('data-bs-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        });

        document.getElementById('mobileToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        });

        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        });

        document.addEventListener('DOMContentLoaded', () => {
            applyTheme(localStorage.getItem('admin_theme') || 'light');
            initCalendar();
        });
    </script>
</body>
</html>
